<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>XPLOR</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body{
margin:0;
font-family:system-ui;
overflow:hidden;
}

/* STARTUP */

.startup{
position:fixed;
inset:0;
background:linear-gradient(135deg,#228B22,#ffffff);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
color:white;
}

.startup-box{
text-align:center;
max-width:420px;
padding:30px;
}

.startup-box h1{
font-size:42px;
}

.startup-box button{
margin-top:20px;
padding:14px 20px;
font-size:16px;
border-radius:14px;
border:none;
cursor:pointer;
}

.hidden{display:none}

/* MAP */

#map{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:1;
}

/* SEARCH BAR */

.topbar{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:white;
padding:12px 18px;
border-radius:40px;
box-shadow:0 6px 25px rgba(0,0,0,0.25);
display:flex;
gap:10px;
z-index:1000;
}

.topbar input{
border:none;
outline:none;
width:260px;
font-size:15px;
}

.topbar button{
border:none;
background:#ff8fa3;
padding:8px 14px;
border-radius:20px;
cursor:pointer;
}

/* SIDEBAR */

.sidebar{
position:fixed;
left:20px;
top:90px;
width:260px;
background:rgba(255,255,255,0.9);
backdrop-filter:blur(8px);
border-radius:18px;
padding:20px;
box-shadow:0 6px 30px rgba(0,0,0,0.3);
z-index:1000;
max-height:80vh;
overflow:auto;
}

.sidebar input,
.sidebar select,
.sidebar button{
width:100%;
padding:10px;
margin-top:8px;
border-radius:10px;
border:1px solid #ddd;
}

.sidebar button{
background:#ff8fa3;
color:white;
border:none;
cursor:pointer;
}

.result{
padding:8px;
border-bottom:1px solid #eee;
cursor:pointer;
display:flex;
justify-content:space-between;
}

/* animated markers */

.pulse{
width:16px;
height:16px;
background:#ff3366;
border-radius:50%;
position:relative;
}

.pulse::after{
content:"";
width:16px;
height:16px;
border-radius:50%;
background:#ff3366;
position:absolute;
left:0;
top:0;
animation:pulse 1.5s infinite;
opacity:0.6;
}

@keyframes pulse{
0%{transform:scale(1)}
100%{transform:scale(2.5);opacity:0}
}

</style>
</head>

<body>

<!-- STARTUP -->

<div id="startup" class="startup">
<div class="startup-box">
<h1>XPLOR</h1>
<p>Find places worth walking to near you :)</p>
<button id="startApp">Start Xploring</button>
</div>
</div>

<div id="map"></div>

<!-- SEARCH BAR -->

<div class="topbar">
<input id="coords" placeholder="Enter your location:">

<button id="btnLocate">📍</button>

<button id="btnSearch">Search</button>

</div>

<!-- SIDEBAR -->

<div class="sidebar">

<h3>Xplor</h3>

<select id="category">
<option value="tourism=museum">Museums</option>
<option value="tourism=gallery">Galleries</option>
<option value="tourism=viewpoint">Viewpoints</option>
<option value="historic=*">Historic places</option>
<option value="leisure=park">Parks</option>
<option value="amenity=restaurant">Restaurants</option>
<option value="amenity=cafe">Cafes</option>
<option value="amenity=fast_food">Fast food</option>
</select>

<label>Radius (km)</label>

<input id="radius" type="number" value="3">

<button id="submitSearch">Submit</button>

<hr>

<h3>Add Hidden Gem 💎</h3>

<input id="placeName" placeholder="Location name">

<button onclick="addAttraction()">Add</button>

<hr>

<h3>Results</h3>

<div id="results"></div>

</div>

<script>

/* STARTUP */

const startup=document.getElementById("startup")

document.getElementById("startApp").onclick=()=>{
startup.classList.add("hidden")
document.getElementById("map").style.display="block"
map.invalidateSize()
}

/* MAP */

const map=L.map("map").setView([51.5074,-0.1278],13)

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
maxZoom:19
}).addTo(map)

const markerLayer=L.layerGroup().addTo(map)

let userLocation=null
let routeLine=null

/* LOCATE USER */

document.getElementById("btnLocate").onclick=()=>{

navigator.geolocation.getCurrentPosition(pos=>{

userLocation=[pos.coords.latitude,pos.coords.longitude]

map.setView(userLocation,14)

L.marker(userLocation).addTo(map).bindPopup("You are here")

})

}

/* DISTANCE */

function distance(lat1,lon1,lat2,lon2){

const R=6371

const dLat=(lat2-lat1)*Math.PI/180
const dLon=(lon2-lon1)*Math.PI/180

const a=
Math.sin(dLat/2)*Math.sin(dLat/2)+
Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)*Math.sin(dLon/2)

return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))

}

/* SEARCH */

document.getElementById("btnSearch").onclick=searchPlaces
document.getElementById("submitSearch").onclick=searchPlaces

async function searchPlaces(){

markerLayer.clearLayers()

let coords=document.getElementById("coords").value
let center

if(coords){

let p=coords.split(",")
center=[parseFloat(p[0]),parseFloat(p[1])]

}else if(userLocation){

center=userLocation

}else{

alert("Enter coordinates or use location")
return

}

const radius=document.getElementById("radius").value*1000
const cat=document.getElementById("category").value
const [key,val]=cat.split("=")

let filter=val==="*" ? `["${key}"]`:`["${key}"="${val}"]`

let query=`
[out:json];
(
node${filter}(around:${radius},${center[0]},${center[1]});
way${filter}(around:${radius},${center[0]},${center[1]});
);
out center tags;
`

const res=await fetch("https://overpass-api.de/api/interpreter",{
method:"POST",
headers:{
"Content-Type":"application/x-www-form-urlencoded"
},
body:"data="+encodeURIComponent(query)
})

const data=await res.json()

const results=document.getElementById("results")
results.innerHTML=""

let places=[]

data.elements.forEach(place=>{

let lat=place.lat||place.center.lat
let lon=place.lon||place.center.lon
let name=place.tags?.name||"Unknown"

let dist=userLocation?
distance(userLocation[0],userLocation[1],lat,lon):999

places.push({name,lat,lon,dist})

})

places.sort((a,b)=>a.dist-b.dist)

places.forEach(p=>{

let marker=L.marker([p.lat,p.lon],{
icon:L.divIcon({
html:'<div class="pulse"></div>',
iconSize:[20,20]
})
}).addTo(markerLayer)

marker.bindPopup(p.name+" ("+p.dist.toFixed(2)+" km)")

marker.on("click",()=>drawRoute(p.lat,p.lon))

const div=document.createElement("div")
div.className="result"
div.innerHTML=`${p.name} <span>${p.dist.toFixed(2)} km</span>`

div.onclick=()=>{
map.setView([p.lat,p.lon],16)
drawRoute(p.lat,p.lon)
}

results.appendChild(div)

})

}

/* ROUTE */

async function drawRoute(lat,lon){

if(!userLocation) return

if(routeLine) map.removeLayer(routeLine)

const key="eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjJmNjJlZmI0ODgwODQ3ZjhhNzE4MDQ1NDE1MTVjOWE4IiwiaCI6Im11cm11cjY0In0="

const url=`https://api.openrouteservice.org/v2/directions/foot-walking?api_key=${key}&start=${userLocation[1]},${userLocation[0]}&end=${lon},${lat}`

const res=await fetch(url)
const data=await res.json()

const coords=data.features[0].geometry.coordinates.map(c=>[c[1],c[0]])

routeLine=L.polyline(coords,{color:"blue",weight:4}).addTo(map)

}

/* ADD GEM */

function addAttraction(){

let name=document.getElementById("placeName").value
if(!name)return

navigator.geolocation.getCurrentPosition(pos=>{

let lat=pos.coords.latitude
let lon=pos.coords.longitude

L.marker([lat,lon]).addTo(map).bindPopup("Hidden Gem: "+name)

})

}

</script>

</body>
</html>
